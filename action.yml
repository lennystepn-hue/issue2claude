name: 'Issue2Claude'
description: 'Automatically solve GitHub Issues with Claude Code — label an issue, get a PR'
author: 'lennystepn-hue'

branding:
  icon: 'cpu'
  color: 'orange'

inputs:
  anthropic-api-key:
    description: 'Anthropic API Key (required for api-key mode)'
    required: false
    default: ''
  github-token:
    description: 'GitHub Token'
    required: true
  auth-mode:
    description: 'Authentication mode: "api-key" or "max" (Claude Max/Pro subscription)'
    required: false
    default: 'api-key'
  oauth-token:
    description: 'Claude OAuth token from ~/.claude/.credentials.json (required for max mode)'
    required: false
    default: ''
  issue-number:
    description: 'Issue number to solve'
    required: false
    default: ''
  issue-title:
    description: 'Issue title'
    required: false
    default: ''
  issue-body:
    description: 'Issue body/description'
    required: false
    default: ''
  repo:
    description: 'Repository (owner/name)'
    required: true
  model:
    description: 'Claude model to use'
    default: 'claude-sonnet-4-6'
  mode:
    description: 'Mode: "issue" (default) or "pr-feedback"'
    required: false
    default: 'issue'
  pr-number:
    description: 'PR number (required for pr-feedback mode)'
    required: false
    default: ''

runs:
  using: 'node20'
  main: 'action/index.js'
